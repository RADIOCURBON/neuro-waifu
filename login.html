<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — NeuroWaifu</title>
<style>
  :root {
    --bg: #14121a;
    --card: #1e1b26;
    --accent: #c084fc;
    --text: #f2eefb;
    --muted: #9a90ad;
    --danger: #ff6b81;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 { margin: 0 0 24px; font-size: 22px; text-align: center; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 16px;
    border-radius: 8px;
    border: 1px solid #35304a;
    background: #100e17;
    color: var(--text);
    font-size: 14px;
  }
  input:focus { outline: 2px solid var(--accent); }
  button {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #1a1625; margin-bottom: 12px; }
  .btn-google {
    background: #fff; color: #1a1625;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .divider { text-align: center; color: var(--muted); font-size: 12px; margin: 16px 0; }
  .error { color: var(--danger); font-size: 13px; margin-bottom: 12px; min-height: 16px; }
  .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .switch a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Вход в NeuroWaifu</h1>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required>
      <label for="password">Пароль</label>
      <input type="password" id="password" required>
      <button type="submit" class="btn-primary">Войти</button>
    </form>
    <div class="divider">или</div>
    <button class="btn-google" id="googleBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.79 2.72v2.26h2.9c1.7-1.57 2.69-3.87 2.69-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.99v2.33C2.47 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 013.68 9c0-.59.1-1.17.27-1.7V4.97H.99A9 9 0 000 9c0 1.45.35 2.83.99 4.03l2.96-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.47 2.02.99 4.97l2.96 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      Войти через Google
    </button>
    <div class="switch">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
  </div>

  <!-- Подключаем Firebase (просто библиотека с сайта Google, ничего настраивать не нужно) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

  <script>
    const errorEl = document.getElementById('error');

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => { window.location.href = 'index.html'; })
        .catch((err) => { errorEl.textContent = 'Ошибка: ' + err.message; });
    });

    document.getElementById('googleBtn').addEventListener('click', () => {
      errorEl.textContent = '';
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(() => { window.location.href = 'index.html'; })
        .catch((err) => { errorEl.textContent = 'Ошибка: ' + err.message; });
    });

    // Если уже вошли - сразу отправляем на главную
    auth.onAuthStateChanged((user) => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
