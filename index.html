<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroWaifu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  auth.onAuthStateChanged((user) => {
    if (!user) {
      window.location.href = 'login.html';
    } else {
      console.log('Вы вошли как', user.email);
        
    }
  });
</script>
<body>

    <canvas id="stars"></canvas>

    <button id="toggleSidebar" class="sidebar-toggle">☰</button>

    <div class="app">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <h1 class="logo">NEUROWAIFU</h1>
            </div>

            <button class="new-chat-button" id="newChat" type="button">+ Новый чат</button>

            <nav class="chat-list">
                <div class="chat-group">
                    <span class="group-title">Сегодня</span>
                    <div id="todayChats"></div>
                </div>
                <div class="chat-group">
                    <span class="group-title">Вчера</span>                </div>
            </nav>
            

<div class="sidebar-footer">
<button class="sidebar-item" type="button" id="profileBtn">
        <img id="profilePhoto" class="sidebar-item-icon" src="" alt=""
             style="width:20px; height:20px; border-radius:50%; display:none; object-fit:cover;">
        <span id="profileIconFallback" class="sidebar-item-icon">👤</span>
        <span id="profileName">Профиль</span>
    </button>
    <button class="sidebar-item" type="button">
        <span class="sidebar-item-icon">⚙</span>
        Настройки
    </button>
    <a href="https://example.com/help" target="_blank" class="sidebar-item">
        <span class="sidebar-item-icon">❔</span>
        Помощь
    </a>
</div>
        </aside>

        <main class="main">
            <section class="messages" id="messages">
                <div class="welcome">
                    <h2>Привет.</h2>
                    <p>Чем могу помочь?</p>
                </div>
            </section>

            <footer class="prompt">
                <!-- Кнопка + удалена -->
                <input id="message" type="text" autocomplete="off" placeholder="Спроси у НейроВайфы...">
                <button id="mic" class="icon-button" type="button">
    <img src="images/mic.svg" alt="микрофон" id="micIcon">
    <span class="recording-dots">
        <span></span>
        <span></span>
        <span></span>
    </span>
</button>
                <button id="send" class="send-button" type="button">➜</button>
            </footer>
        </main>

    </div>
    <!-- Правая панель -->
<aside class="sidebar sidebar-right" id="sidebarRight">
    <div class="sidebar-top">
        <h2 class="logo" style="font-size:18px;">История чата</h2>
        <!-- кнопки больше нет -->
    </div>
    <div class="messages right-messages" id="rightMessages">
        <!-- сюда будут дублироваться сообщения -->
    </div>
</aside>
<button id="toggleRightSidebar">☰</button>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/stars.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/chats.js"></script>
<!-- menu.js не подключаем -->
<script src="js/messages.js"></script>
<script src="js/speech.js"></script>
<script src="js/right-panel.js"></script>
<script src="js/app.js"></script>
<script>
      auth.onAuthStateChanged((user) => {
        if (!user) {
          window.location.href = 'login.html';
          return;
        }

        // Имя: Google даёт настоящее имя, у email-аккаунтов берём часть до @
        document.getElementById('profileName').textContent =
          user.displayName || user.email.split('@')[0];

        // Фото: есть только у Google-аккаунтов
        if (user.photoURL) {
          document.getElementById('profilePhoto').src = user.photoURL;
          document.getElementById('profilePhoto').style.display = 'inline-block';
          document.getElementById('profileIconFallback').style.display = 'none';
        }
      });

      // (по желанию) клик по кнопке "Профиль" -> выход из аккаунта
      document.getElementById('profileBtn').addEventListener('click', () => {
        if (confirm('Выйти из аккаунта?')) {
          auth.signOut().then(() => window.location.href = 'login.html');
        }
      });
    </script>
</body>

</html>
